<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#11151a">

  <title>FlashMind 黄金マインド</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <main id="app">
    <header class="app-header">
      <h1>FlashMind</h1>
    </header>

    <section class="mind-card">
      <p id="mind-text">読み込み中です...</p>
    </section>

    <section class="controls">
      <div class="control-group">
        <p class="control-title">切り替え速度</p>

        <div class="button-row" id="speed-controls">
          <button type="button" data-speed="500">0.5秒</button>
          <button type="button" data-speed="1000" class="active">1秒</button>
          <button type="button" data-speed="1500">1.5秒</button>
        </div>
      </div>

      <div class="control-group">
        <p class="control-title">タイマー</p>

        <div class="button-row" id="timer-controls">
          <button type="button" data-minutes="1">1分</button>
          <button type="button" data-minutes="3" class="active">3分</button>
          <button type="button" data-minutes="5">5分</button>
        </div>
      </div>

      <div class="action-row">
        <button type="button" id="sound-button">🔊 音声ON</button>
        <button type="button" id="play-button">⏸ 一時停止</button>
      </div>

      <p id="status-text">3分間の再生中</p>
    </section>
  </main>

  <script src="script.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js");
      });
    }
  </script>
</body>
</html>
